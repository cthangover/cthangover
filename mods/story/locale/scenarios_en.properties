tutorial/line1 = Hello, friend!
tutorial/line2 = Text will appear here, each time you tap on it the story moves forward.
tutorial/line3 = Great! You've learned to poke your piss-stained finger at the screen, it's a magnificent skill, but not everything will be built this primitively...
tutorial/line4 = Sometimes you'll encounter choices.
tutorial/choose = Pick the option you like from above, and tap it so we can continue.
tutorial/opt1 = Option 1
tutorial/opt2 = Option 2
tutorial/opt3 = Option 3
tutorial/line5 = Good, you've managed it again! (Feels like I'm talking to a mentally challenged person...)
tutorial/line6 = You had a choice, you made it and learned to pick one piece of crap from several pieces of crap, Escobar is pleased with you, and your choice, by the way, has affected everything that will happen next.
tutorial/line7 = Also, you'll encounter situations where there's no narration at all. In those cases, you must interact with the scene you see.
tutorial/line8 = Let's practice. I'll remove the narration now, and you'll need to precisely tap on the scene. Interactive objects in the scene highlight under the cursor, so you won't make a mistake.
