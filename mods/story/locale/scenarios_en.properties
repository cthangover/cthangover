prolog/intro1/line1 = This story began the moment some evil demon decided to destroy the world.
prolog/intro1/line2 = He used an ancient scroll of absolute destruction to activate a full reality nullifier.
prolog/intro1/line3 = Fuck, what kind of bullshit are you spouting?
prolog/intro1/line4 = When a Poet lays his life down on paper — the last thing one should do is listen to bookish yappers, monsieur, silence, please.
prolog/intro1/line5 = ...
prolog/intro1/line6 = Ahem...
prolog/intro1/line7 = The whole world was on the brink of destruction.
prolog/intro1/line8 = That demon was impossible to stop.
prolog/intro1/line9 = AAAAAH! Fuck! I can't take this anymore...
prolog/intro1/line10 = You village dick-scarer, you used the image of the Ancient One from my pages and made up some ungodly bullshit about demons! Don't drag the images of the Great Ones through the mud! They're not fucking demons!
prolog/intro1/line11 = Horns! Fucking horns. You drew fucking horns on him! How dare you... how dare you?!
prolog/intro1/line12 = Shut your word-hole, sir. Or whatever it is you flap your pages with...
prolog/intro1/line13 = I am Al-Azif, you triple-fucked ballsack!
prolog/intro1/line14 = Don't give a shit at all. I'm writing my majestic memoirs, and I don't give a fuck about your ancient-whatsits, truth, or Azifs.
prolog/intro1/line15 = My multipage buddy, you're a parchment on a spine that 30-year-old mages wipe their dirty hands on after jerking off. Nothing more, nothing less. If I want — I'll burn your ass to a crisp.
prolog/intro1/line16 = I cannot be harmed, my essence can be neither burned nor scratched, I am materialized Truth! And you are just a horny piece of shit!! My being has nothing to do with magic.
prolog/intro1/line17 = Can't burn you? Then I'll fuck you. And then I'll wipe my ass with these very pages.
prolog/intro1/line18 = ...
prolog/intro1/line19 = What an ignorant fuckwad you are... You just don't realize how batshit crazy you are...
prolog/intro1/line20 = Don't care. I'm the Author, the Creator! I'll write as I feel, and I feel a chub coming on and I need to take a shit.
prolog/intro1/line21 = You can shit yourself thrice over, you've thoroughly pissed me off!
prolog/intro1/line22 = Fuck your scribbles. Fuck you. Fuck the Ancients.
prolog/intro1/line23 = But you're the one who stirred up all this bullshit yourself. And you're describing some grandiose horseshit.
prolog/intro1/line24 = Did your memory get knocked out?
prolog/intro1/line25 = I'll remind you. Start from the moment where you're lying naked in the slums on the street, unconscious.
prolog/slums_book/line1 = Marao stumbled upon a bookshop. Among the charred pages, one stood out — it shimmered in the light of the morning dawn.
prolog/slums_book/line2 = He reached out, touching the binding...
prolog/slums_after/line1 = The book turned out to be a recipe collection — Marao recalled buying it the night before.
prolog/slums_after/line2 = It's already getting dark. Need to find shelter.
prolog/cloak/line1 = Marao felt an old cloak in a pile of trash.
prolog/cloak/line2 = It smelled awful, but there was no choice.
prolog/cloak/line3 = Something clinked in the cloak's pocket...
